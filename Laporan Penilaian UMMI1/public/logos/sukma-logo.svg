<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 660" role="img" aria-label="Logo SUKMA - Sekolah Unggulan Kebonsari Malang - Sekolah Para Juara">
  <defs>
    <!-- Gradient tiap warna: terang di kiri-atas, gelap di kanan-bawah (efek 3D) -->
    <linearGradient id="sRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0392f"/>
      <stop offset="55%" stop-color="#a13027"/>
      <stop offset="100%" stop-color="#6e2019"/>
    </linearGradient>
    <linearGradient id="sBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3aa9da"/>
      <stop offset="55%" stop-color="#2b85b0"/>
      <stop offset="100%" stop-color="#1c5a78"/>
    </linearGradient>
    <linearGradient id="sGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#54b84d"/>
      <stop offset="55%" stop-color="#3c8f38"/>
      <stop offset="100%" stop-color="#236626"/>
    </linearGradient>
    <linearGradient id="sOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a13a"/>
      <stop offset="55%" stop-color="#c8842a"/>
      <stop offset="100%" stop-color="#8c5a1c"/>
    </linearGradient>
    <linearGradient id="sNavy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a5fb0"/>
      <stop offset="55%" stop-color="#2c4690"/>
      <stop offset="100%" stop-color="#1e2d63"/>
    </linearGradient>

    <!-- Hexagon flat-top, radius 100 (lebar penuh 200, tinggi 173.2) -->
    <symbol id="hexF" viewBox="-104 -94 208 188" overflow="visible">
      <polygon points="100,0 50,86.6 -50,86.6 -100,0 -50,-86.6 50,-86.6"/>
      <!-- bayangan sisi kanan-bawah -->
      <polygon points="100,0 50,86.6 -50,86.6 -100,0" fill="#000" opacity="0.14"/>
      <!-- highlight sisi kiri-atas -->
      <polygon points="-100,0 -50,-86.6 50,-86.6 100,0" fill="#fff" opacity="0.08"/>
    </symbol>
  </defs>

  <!-- Baris atas: S U K -->
  <use href="#hexF" x="0" y="0" width="0" height="0" transform="translate(140 120)" fill="url(#sRed)"/>
  <use href="#hexF" transform="translate(330 120)" fill="url(#sBlue)"/>
  <use href="#hexF" transform="translate(520 120)" fill="url(#sGreen)"/>
  <!-- Baris bawah (offset): M A -->
  <use href="#hexF" transform="translate(235 290)" fill="url(#sOrange)"/>
  <use href="#hexF" transform="translate(425 290)" fill="url(#sNavy)"/>

  <!-- Huruf -->
  <g fill="#ffffff" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif" font-weight="900" text-anchor="middle" dominant-baseline="central">
    <text x="140" y="125" font-size="132">S</text>
    <text x="330" y="125" font-size="132">U</text>
    <text x="520" y="125" font-size="132">K</text>
    <text x="235" y="295" font-size="132">M</text>
    <text x="425" y="295" font-size="132">A</text>
  </g>

  <!-- Teks bawah -->
  <g text-anchor="middle" font-family="Arial,'Helvetica Neue',sans-serif">
    <text x="380" y="560" font-size="33" font-weight="600" letter-spacing="1.5" fill="#3a3a3a">SEKOLAH UNGGULAN KEBONSARI MALANG</text>
    <text x="380" y="625" font-size="62" font-weight="900" letter-spacing="2" fill="#111111">SEKOLAH PARA JUARA</text>
  </g>
</svg>
